services:
  ###################################################
  # Service: traefik (Reverse Proxy)
  ###################################################
  traefik:
    image: traefik:v3.6
    container_name: traefik-bipolar-chatbot
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web-net

  ###################################################
  # Service: backend (FastAPI)
  ###################################################
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    volumes:
      # Hot-reload: mount local code into container
      - ./backend/app:/app/backend/app
    env_file:
      - .env
    environment:
      # Override DB_HOST — in Docker, mysql is the service name not localhost
      - DB_HOST=mysql
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CORS_ORIGINS=http://localhost
    labels:
      traefik.enable: true
      traefik.http.routers.backend.rule: PathPrefix(`/api`)
      traefik.http.services.backend.loadbalancer.server.port: 8000
    expose:
      - 8000
    networks:
      - web-net

  ###################################################
  # Service: frontend (React/Vite)
  ###################################################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - VITE_API_BASE_URL=/api
    labels:
      traefik.enable: true
      traefik.http.routers.frontend.rule: PathPrefix(`/`)
      traefik.http.routers.frontend.priority: 1
      traefik.http.services.frontend.loadbalancer.server.port: 5173
    expose:
      - 5173
    networks:
      - web-net
    depends_on:
      - backend

###################################################
# Networks and Volumes
###################################################
volumes:
  mysql-data:


networks:
  web-net:
